<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dino Run</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <img id="game-logo" src="game_logo.png" alt="Game logo" />
      <div id="hud">
        <span id="score">00000</span>
        <span id="hi-label">HI <span id="hi-score">00000</span></span>
      </div>
      <div id="game-wrap">
        <canvas id="game" width="800" height="200"></canvas>
        <div id="overlay" class="visible">
          <p id="overlay-title">Press Space to start</p>
          <p id="overlay-hint">Space jump · ↓ duck</p>
        </div>
      </div>
    </div>
    <script src="game.js" defer></script>
  </body>
</html>
